<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="card.css"></head>
<body>
  <div class="card-title">Thinking-level ramp — encodes reasoning effort in the editor frame</div>
  <div class="col" style="gap:9px">
    <div class="row"><span style="display:inline-block;width:64px;height:14px;background:#505050;border-radius:2px"></span><span class="dim" style="width:70px">off</span><span class="dim">#505050</span></div>
    <div class="row"><span style="display:inline-block;width:64px;height:14px;background:#6e6e6e;border-radius:2px"></span><span class="dim" style="width:70px">minimal</span><span class="dim">#6e6e6e</span></div>
    <div class="row"><span style="display:inline-block;width:64px;height:14px;background:#5f87af;border-radius:2px"></span><span class="dim" style="width:70px">low</span><span class="dim">#5f87af</span></div>
    <div class="row"><span style="display:inline-block;width:64px;height:14px;background:#81a2be;border-radius:2px"></span><span class="dim" style="width:70px">medium</span><span class="dim">#81a2be</span></div>
    <div class="row"><span style="display:inline-block;width:64px;height:14px;background:#b294bb;border-radius:2px"></span><span class="dim" style="width:70px">high</span><span class="dim">#b294bb</span></div>
    <div class="row"><span style="display:inline-block;width:64px;height:14px;background:#d183e8;border-radius:2px"></span><span class="dim" style="width:70px">xhigh</span><span class="dim">#d183e8</span></div>
  </div>
