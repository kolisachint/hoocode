<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="card.css"></head>
<body>
  <div class="card-title">Surface tints — flat fills, no border / shadow</div>
  <div class="swgrid" style="grid-template-columns:repeat(4,1fr);">
    <div class="sw"><div class="chip" style="background:#18181e;outline:1px solid #2a2a32"></div><span class="name">page</span><span class="hex">#18181e</span></div>
    <div class="sw"><div class="chip" style="background:#1e1e24"></div><span class="name">card / panel</span><span class="hex">#1e1e24</span></div>
    <div class="sw"><div class="chip" style="background:#343541"></div><span class="name">user msg</span><span class="hex">#343541</span></div>
    <div class="sw"><div class="chip" style="background:#3a3a4a"></div><span class="name">selected</span><span class="hex">#3a3a4a</span></div>
    <div class="sw"><div class="chip" style="background:#282832"></div><span class="name">tool pending</span><span class="hex">#282832</span></div>
    <div class="sw"><div class="chip" style="background:#283228"></div><span class="name">tool success</span><span class="hex">#283228</span></div>
    <div class="sw"><div class="chip" style="background:#3c2828"></div><span class="name">tool error</span><span class="hex">#3c2828</span></div>
    <div class="sw"><div class="chip" style="background:#2d2838"></div><span class="name">skill / hook</span><span class="hex">#2d2838</span></div>
  </div>
</body></html>
