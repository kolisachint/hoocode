<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="card.css"></head>
<body>
  <div class="card-title">Semantic colors</div>
  <div class="swgrid" style="grid-template-columns:repeat(5,1fr);">
    <div class="sw"><div class="chip" style="background:#b5bd68"></div><span class="name">success</span><span class="hex">#b5bd68</span><span class="use">done · added</span></div>
    <div class="sw"><div class="chip" style="background:#cc6666"></div><span class="name">error</span><span class="hex">#cc6666</span><span class="use">failed · removed</span></div>
    <div class="sw"><div class="chip" style="background:#ffff00"></div><span class="name">warning</span><span class="hex">#ffff00</span><span class="use">in-progress · lines</span></div>
    <div class="sw"><div class="chip" style="background:#808080"></div><span class="name">muted</span><span class="hex">#808080</span><span class="use">labels</span></div>
    <div class="sw"><div class="chip" style="background:#666666"></div><span class="name">dim</span><span class="hex">#666666</span><span class="use">chrome · hints</span></div>
  </div>
</body></html>
