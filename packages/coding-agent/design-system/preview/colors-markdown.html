<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="card.css"></head>
<body>
  <div class="card-title">Markdown colors</div>
  <div class="swgrid" style="grid-template-columns:repeat(4,1fr);">
    <div class="sw"><div class="chip" style="background:#f0c674"></div><span class="name">heading</span><span class="hex">#f0c674</span></div>
    <div class="sw"><div class="chip" style="background:#81a2be"></div><span class="name">link</span><span class="hex">#81a2be</span></div>
    <div class="sw"><div class="chip" style="background:#8abeb7"></div><span class="name">inline code</span><span class="hex">#8abeb7</span></div>
    <div class="sw"><div class="chip" style="background:#b5bd68"></div><span class="name">code block</span><span class="hex">#b5bd68</span></div>
  </div>
  <div style="margin-top:18px;font-size:12px;line-height:18px">
    <span style="color:#f0c674;font-weight:700"># Heading</span><br>
    body text with an <span style="color:#81a2be;text-decoration:underline">inline link</span> and <span style="color:#8abeb7">`inline code`</span>.<br>
    <span style="color:#808080;border-left:3px solid #808080;padding-left:10px;font-style:italic;display:inline-block;margin-top:6px">blockquote in muted italic</span>
  </div>
</body></html>
