<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="card.css"></head>
<body>
  <div class="card-title">Core &amp; structural colors</div>
  <div class="swgrid" style="grid-template-columns:repeat(4,1fr);">
    <div class="sw"><div class="chip" style="background:#8abeb7"></div><span class="name">accent</span><span class="hex">#8abeb7</span><span class="use">paths · bullets · cursor</span></div>
    <div class="sw"><div class="chip" style="background:#5f87ff"></div><span class="name">border</span><span class="hex">#5f87ff</span><span class="use">rules · field focus</span></div>
    <div class="sw"><div class="chip" style="background:#00d7ff"></div><span class="name">borderAccent</span><span class="hex">#00d7ff</span><span class="use">headings · model</span></div>
    <div class="sw"><div class="chip" style="background:#e5e5e7"></div><span class="name">text</span><span class="hex">#e5e5e7</span><span class="use">default fg</span></div>
  </div>
</body></html>
