<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="card.css"></head>
<body>
  <div class="card-title">Wordmark — the name at the prompt</div>
  <div class="row" style="gap:12px;align-items:baseline">
    <span style="font-family:var(--font-terminal);font-size:40px;font-weight:700;letter-spacing:0.01em"><span class="accent">hoo</span><span style="color:#e5e5e7">code</span></span>
    <span style="display:inline-block;width:16px;height:32px;background:#8abeb7;transform:translateY(3px)"></span>
  </div>
  <div class="row" style="gap:10px;align-items:baseline;margin-top:16px;font-size:13px">
    <span class="accent">&gt;</span>
    <span class="bold">hoocode</span>
    <span class="dim">/</span>
    <span class="accent">hoo</span>
    <span class="dim">— deterministic terminal coding agent</span>
  </div>
  <div class="dim" style="font-size:10px;margin-top:12px">accent #8abeb7 + text #e5e5e7 on page #18181e · monospace only · block cursor · no raster art, no emoji</div>
</body></html>
