<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="card.css"></head>
<body>
  <div class="card-title">Task panel — pinned above the prompt, deterministic status</div>
  <pre style="font-size:13px;line-height:21px"><span class="success">✓</span> <span class="dim">#1</span> Read theme + tool components
<span class="success">✓</span> <span class="dim">#2</span> Translate palette to CSS tokens
<span class="warning">◐</span> <span class="dim">#3</span> Build UI kit transcript <span class="accent">[subagent]</span>
<span class="dim">●</span> <span class="dim">#4</span> Register design-system cards
<span class="error">✗</span> <span class="dim">#5</span> Wire model selector</pre>
  <div class="row wrap" style="gap:16px;margin-top:14px;font-size:10px;color:#808080">
    <span><span class="dim">●</span> pending</span><span><span class="warning">◐</span> in-progress</span><span><span class="success">✓</span> done</span><span><span class="error">✗</span> failed</span><span><span class="accent">[mode]</span> subagent tag</span>
  </div>
</body></html>
