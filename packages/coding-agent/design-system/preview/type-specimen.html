<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="card.css"></head>
<body>
  <div class="card-title">Type specimen — one family, monospace</div>
  <div style="font-size:30px;line-height:1.2;letter-spacing:-0.01em">JetBrains Mono</div>
  <div class="dim" style="font-size:11px;margin:6px 0 16px">brand fonts: JetBrains Mono (body) · MesloLGS NF (terminal/wordmark) — self-hosted</div>
  <div style="font-size:20px">ABCDEFGHIJKLM abcdefghijklm 0123456789</div>
  <div style="font-size:14px;margin-top:6px">{ } [ ] ( ) &lt; &gt; / \ | • · ─ ↑ ↓ ● ◐ ✓ ✗</div>
  <div class="row" style="gap:24px;margin-top:16px;align-items:flex-end">
    <div class="col"><span style="font-size:12px">12px / 18</span><span class="dim" style="font-size:10px">body</span></div>
    <div class="col"><span style="font-size:11px">11px / 15</span><span class="dim" style="font-size:10px">chrome</span></div>
    <div class="col"><span style="font-size:10px">10px / 14</span><span class="dim" style="font-size:10px">meta</span></div>
    <div class="col"><span style="font-size:12px;font-weight:700">700 bold</span><span class="dim" style="font-size:10px">titles</span></div>
    <div class="col"><span style="font-size:12px;font-style:italic">italic</span><span class="dim" style="font-size:10px">thinking</span></div>
  </div>
</body></html>
