<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="card.css"></head>
<body>
  <div class="card-title">Glyph set — the entire "icon system" (no font, no emoji)</div>
  <div class="swgrid" style="grid-template-columns:repeat(6,1fr);gap:16px 12px;font-size:11px">
    <div class="col"><span class="dim" style="font-size:22px">●</span><span>pending</span></div>
    <div class="col"><span class="warning" style="font-size:22px">◐</span><span>in-progress</span></div>
    <div class="col"><span class="success" style="font-size:22px">✓</span><span>done</span></div>
    <div class="col"><span class="error" style="font-size:22px">✗</span><span>failed</span></div>
    <div class="col"><span class="accent" style="font-size:22px">⠹</span><span>spinner</span></div>
    <div class="col"><span class="accent" style="font-size:22px">&gt;</span><span>cursor</span></div>
    <div class="col"><span class="bold" style="font-size:22px">$</span><span>bash</span></div>
    <div class="col"><span class="success" style="font-size:18px">[x]</span><span>toggle on</span></div>
    <div class="col"><span class="dim" style="font-size:18px">[ ]</span><span>toggle off</span></div>
    <div class="col"><span class="dim" style="font-size:22px">↑↓</span><span>tokens</span></div>
    <div class="col"><span style="font-size:22px;color:#5f87ff">─</span><span>rule</span></div>
    <div class="col"><span class="dim" style="font-size:22px">• ·</span><span>joiners</span></div>
  </div>
</body></html>
