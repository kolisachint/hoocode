name: Build Binaries

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - darwin-arm64
          - darwin-x64
          - linux-x64
          - linux-arm64
          - windows-x64
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20 with npm 10
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Pin npm to 10.x (avoid an arborist regression in npm 11.x that throws
              "Invalid Version" when resolving this monorepo's workspace cycle)
        run: npm install -g npm@10

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binaries
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ inputs.platform }}" == "all" ]]; then
              ./scripts/build-binaries.sh
            else
              ./scripts/build-binaries.sh --platform ${{ inputs.platform }}
            fi
          else
            ./scripts/build-binaries.sh
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: packages/coding-agent/binaries/*
          retention-days: 5

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: binaries

      - name: Generate checksums
        run: |
          cd binaries
          for file in *.tar.gz *.zip *.exe; do
            if [[ -f "$file" ]]; then
              sha256sum "$file" > "$file.sha256"
            fi
          done

      - name: Generate winget manifest
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          SHA256=$(cat binaries/hoocode-windows-x64.exe.sha256 | awk '{print $1}')
          node scripts/generate-winget-manifest.mjs \
            "$VERSION" \
            "$SHA256" \
            "https://github.com/kolisachint/hoocode/releases/download/${{ github.ref_name }}/hoocode-windows-x64.exe" \
            --output binaries/kolisachint.hoocode.yaml

      - name: Create Release
        run: gh release create ${{ github.ref_name }} --title "${{ github.ref_name }}" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload Assets
        run: find binaries -maxdepth 1 -type f -print0 | xargs -0 gh release upload ${{ github.ref_name }} --clobber
        env:
          GH_TOKEN: ${{ github.token }}