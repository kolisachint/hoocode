name: Build Binaries

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - darwin-arm64
          - darwin-x64
          - linux-x64
          - linux-arm64
          - windows-x64
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binaries
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ inputs.platform }}" == "all" ]]; then
              ./scripts/build-binaries.sh
            else
              ./scripts/build-binaries.sh --platform ${{ inputs.platform }}
            fi
          else
            ./scripts/build-binaries.sh
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: packages/coding-agent/binaries/*
          retention-days: 5

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: binaries

      - name: Generate checksums
        run: |
          cd binaries
          for file in *.tar.gz *.zip *.exe; do
            if [[ -f "$file" ]]; then
              sha256sum "$file" > "$file.sha256"
            fi
          done

      - name: Create winget manifest
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cat > binaries/hoocode-windows-x64.yaml << EOF
          PackageIdentifier: kolisachint.hoocode
          PackageVersion: $VERSION
          InstallerType: zip
          Installers:
            - Architecture: x64
              InstallerUrl: https://github.com/kolisachint/hoocode/releases/download/${{ github.ref_name }}/hoocode-windows-x64.zip
              InstallerSha256: $(cat binaries/hoocode-windows-x64.zip.sha256 | awk '{print $1}')
          EOF

      - name: Create Release
        run: gh release create ${{ github.ref_name }} --title "${{ github.ref_name }}" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload Assets
        run: gh release upload ${{ github.ref_name }} binaries/* --clobber
        env:
          GH_TOKEN: ${{ github.token }}