name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Pin npm to 10.x
        run: npm install -g npm@10

      - name: Install dependencies
        run: npm ci

      - name: Check code quality
        run: npm run check

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [ai, agent, coding-agent, tui]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Pin npm to 10.x
        run: npm install -g npm@10

      - name: Install dependencies
        run: npm ci

      - name: Build dependencies
        run: |
          cd packages/ai && npm run build
          cd ../agent && npm run build
          cd ../tui && npm run build

      - name: Test ${{ matrix.package }}
        run: cd packages/${{ matrix.package }} && npm run test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Pin npm to 10.x
        run: npm install -g npm@10

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build
