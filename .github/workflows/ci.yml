name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # bun is the toolchain. bunfig.toml pins the npm-compatible hoisted linker.
  # See docs/bun-migration.md.
  bun-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check code quality
        run: bun run check

  bun-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [ai, agent, coding-agent, tui]
    steps:
      - uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build dependencies
        run: |
          cd packages/ai && bun run build
          cd ../agent && bun run build
          cd ../tui && bun run build

      - name: Test ${{ matrix.package }}
        run: cd packages/${{ matrix.package }} && bun run test

  bun-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all packages
        run: bun run build
