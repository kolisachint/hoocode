name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Pin npm to 10.x (avoid arborist workspace-cycle crash in npm 11)
        run: sudo npm install -g npm@10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Hoist Bun deps for tsgo/tsc compatibility
        run: node scripts/hoist-bun-deps.mjs

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions@github.com"

      - name: Run release script
        run: bun run release:${{ inputs.version }}

      - name: Push changes
        run: git push --follow-tags

  binaries:
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Windows binary
        run: bash scripts/build-binaries.sh

      - name: Create Release
        run: gh release create v$(node -p "require('./packages/coding-agent/package.json').version") --title "v$(node -p "require('./packages/coding-agent/package.json').version")" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload Release Asset
        run: gh release upload v$(node -p "require('./packages/coding-agent/package.json').version") packages/coding-agent/binaries/hoocode-windows-x64.zip --clobber
        env:
          GH_TOKEN: ${{ github.token }}
