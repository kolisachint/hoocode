name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Pin npm to 10.x (avoid arborist workspace-cycle crash in npm 11)
        run: sudo npm install -g npm@10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Hoist Bun deps for tsgo/tsc compatibility
        run: node scripts/hoist-bun-deps.mjs

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions@github.com"

      - name: Run release script
        run: bun run release:${{ inputs.version }}

      - name: Push changes
        run: git push --follow-tags

  binaries:
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all binaries
        run: bash scripts/build-binaries.sh

      - name: Generate SHA256 for winget
        run: |
          BIN_DIR="packages/coding-agent/binaries"
          sha256sum "$BIN_DIR/hoocode-windows-x64.exe" | cut -d' ' -f1 > "$BIN_DIR/hoocode-windows-x64.exe.sha256"

      - name: Generate winget manifest
        run: |
          BIN_DIR="packages/coding-agent/binaries"
          VERSION=$(node -p "require('./packages/coding-agent/package.json').version")
          SHA256=$(cat "$BIN_DIR/hoocode-windows-x64.exe.sha256" | awk '{print $1}')
          node scripts/generate-winget-manifest.mjs \
            "$VERSION" \
            "$SHA256" \
            "https://github.com/kolisachint/hoocode/releases/download/v${VERSION}/hoocode-windows-x64.exe" \
            --output "$BIN_DIR/kolisachint.hoocode.yaml"

      - name: Create Release
        run: gh release create v$(node -p "require('./packages/coding-agent/package.json').version") --title "v$(node -p "require('./packages/coding-agent/package.json').version")" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload Release Assets
        run: find packages/coding-agent/binaries -maxdepth 1 -type f -print0 | xargs -0 gh release upload v$(node -p "require('./packages/coding-agent/package.json').version") --clobber
        env:
          GH_TOKEN: ${{ github.token }}
