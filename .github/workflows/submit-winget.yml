name: Submit to Winget

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  submit:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download manifest from release
        run: gh release download ${{ github.event.release.tag_name }} -p "kolisachint.hoocode.yaml" -O "$env:TEMP\manifest.yaml"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Download wingetcreate
        run: Invoke-WebRequest https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe

      - name: Submit to winget-pkgs
        run: .\wingetcreate.exe submit --token ${{ secrets.WINGET_PAT }} "$env:TEMP\manifest.yaml"

      - name: Report failure
        if: failure()
        run: |
          Write-Host "winget submission failed. Common issues:"
          Write-Host "1. Duplicate submission - manifest already exists in winget-pkgs"
          Write-Host "2. Invalid manifest - check YAML syntax and required fields"
          Write-Host "3. PAT issues - ensure WINGET_PAT has public_repo scope"
          Write-Host ""
          Write-Host "Manual submission fallback:"
          Write-Host "1. Fork https://github.com/microsoft/winget-pkgs"
          Write-Host "2. Clone your fork locally"
          Write-Host "3. Copy manifest to: manifests/k/kolisachint/hoocode/<version>/kolisachint.hoocode.yaml"
          Write-Host "4. Commit and push to your fork"
          Write-Host "5. Open PR at https://github.com/microsoft/winget-pkgs/compare"
